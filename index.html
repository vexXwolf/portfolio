<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Respawn — QA Lead Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/bug.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
/* ── Reset & Industrial Theme ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#09090b;
  color:#e4e4e7;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}
.font-mono { font-family: 'JetBrains Mono', monospace; }

/* ── Prevent Grey Spaces ── */
.column-box {
  background: #121214;
  border: 1px solid #27272a;
  padding: 1.5rem;
}

/* ── Your Original Project Styling ── */
.project-card {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.project-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.filter-btn.active {
  background: #f97316;
  color: white;
  border-color: #f97316;
}
</style>
</head>

<body>

<main class="min-h-screen">
  <header class="max-w-6xl mx-auto px-6 pt-20 pb-10">
    <div class="mb-10">
      <span class="font-mono text-orange-500 text-[10px] tracking-widest uppercase">QA Lead / Technical Tester</span>
      <h1 class="text-7xl font-black tracking-tighter text-white mt-2">RESPAWN<span class="text-orange-500">.</span></h1>
    </div>

    <div id="stats-row" class="grid grid-cols-2 md:grid-cols-4 gap-6 py-10 border-y border-zinc-800/50">
      </div>
  </header>

  <section class="max-w-6xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
      
      <div class="space-y-4">
        <h3 class="font-mono text-[10px] tracking-[0.2em] uppercase text-zinc-500">_Expertise</h3>
        <div class="column-box">
          <ul class="space-y-3 text-sm text-zinc-400 font-mono">
            <li><span class="text-orange-500 mr-2">→</span>Regression Testing</li>
            <li><span class="text-orange-500 mr-2">→</span>Bug Documentation</li>
            <li><span class="text-orange-500 mr-2">→</span>Stress Testing</li>
            <li><span class="text-orange-500 mr-2">→</span>API Validation</li>
          </ul>
        </div>
      </div>

      <div class="space-y-4">
        <h3 class="font-mono text-[10px] tracking-[0.2em] uppercase text-zinc-500">_Report_Evidence</h3>
        <div class="column-box space-y-3">
          <a href="#" target="_blank" class="flex items-center justify-between group p-2 border border-zinc-800 hover:border-orange-500 transition-all bg-zinc-900/30">
            <span class="text-[10px] font-mono uppercase tracking-tight">Full Audit: Fast Food Sim</span>
            <i data-lucide="external-link" class="w-3 h-3 text-zinc-600 group-hover:text-orange-500"></i>
          </a>
          <a href="#" target="_blank" class="flex items-center justify-between group p-2 border border-zinc-800 hover:border-orange-500 transition-all bg-zinc-900/30">
            <span class="text-[10px] font-mono uppercase tracking-tight">Bug Report Template</span>
            <i data-lucide="external-link" class="w-3 h-3 text-zinc-600 group-hover:text-orange-500"></i>
          </a>
        </div>
      </div>

      <div class="space-y-4">
        <h3 class="font-mono text-[10px] tracking-[0.2em] uppercase text-zinc-500">_System_Stack</h3>
        <div class="column-box flex flex-wrap gap-2">
          <span class="px-2 py-1 bg-zinc-900 border border-zinc-800 text-[10px] font-mono text-zinc-500">SOBER</span>
          <span class="px-2 py-1 bg-zinc-900 border border-zinc-800 text-[10px] font-mono text-zinc-500">FIDDLER</span>
          <span class="px-2 py-1 bg-zinc-900 border border-zinc-800 text-[10px] font-mono text-zinc-500">POSTMAN</span>
          <span class="px-2 py-1 bg-zinc-900 border border-zinc-800 text-[10px] font-mono text-zinc-500">ROBLOX STUDIO</span>
        </div>
      </div>
    </div>
  </section>

  <section class="max-w-6xl mx-auto px-6 py-6 border-t border-zinc-800/50">
    <div class="flex gap-4">
      <button onclick="filterProjects('qa')" data-f="qa" class="filter-btn active font-mono text-[10px] uppercase tracking-[0.2em] px-6 py-3 border border-zinc-800 hover:border-zinc-600 transition-all">QA Testing</button>
      <button onclick="filterProjects('top')" data-f="top" class="filter-btn font-mono text-[10px] uppercase tracking-[0.2em] px-6 py-3 border border-zinc-800 hover:border-zinc-600 transition-all">Top Visits</button>
    </div>
  </section>

  <section class="max-w-6xl mx-auto px-6 py-12">
    <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10 items-start">
      </div>
  </section>

  <footer class="max-w-6xl mx-auto px-6 py-20 border-t border-zinc-800/50 flex justify-between items-center">
    <span class="font-mono text-[10px] text-zinc-600 uppercase tracking-widest">© 2026 Respawn // Industrial QA</span>
    <div id="social-row" class="flex gap-4"></div>
  </footer>
</main>

<script>
const DATA = {
  socials: {
    discord: "https://discord.com/users/YOUR_DISCORD_ID", // Change to your ID
    website: "#"
  },
  stats: [
    { n: "120M+", label: "Total Visits" },
    { n: "15+",   label: "Projects" },
    { n: "200+",  label: "Bugs Found" },
    { n: "99%",   label: "Client Rate" }
  ],
  projects: [
    {
      id: 1,
      title: "Fast Food Simulator",
      topVisits: "yes",
      category: "qa",
      tags: ["Stress Testing", "Logic"],
      desc: "Comprehensive testing of order logic and player interactions under high server load.",
      stats: "50M+ Visits",
      img: "https://images.unsplash.com/photo-1556742044-3c52d6e88c02?auto=format&fit=crop&q=80&w=800"
    },
    {
      id: 2,
      title: "Camo or Snipe",
      topVisits: "yes",
      category: "qa",
      tags: ["Balancing", "UI/UX"],
      desc: "Refined weapon drop rates and performed regression testing on core gameplay mechanics.",
      stats: "30M+ Visits",
      img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=800"
    }
  ]
};

function icons() { lucide.createIcons(); }

function renderStats() {
  const el = document.getElementById('stats-row');
  DATA.stats.forEach(s => {
    const d = document.createElement('div');
    d.className = 'flex flex-col';
    d.innerHTML = `
      <span class="font-mono text-3xl font-bold text-white tracking-tighter">${s.n}</span>
      <span class="font-mono text-[9px] uppercase text-zinc-600 tracking-widest">${s.label}</span>
    `;
    el.appendChild(d);
  });
}

function renderProjects(filter = 'qa') {
  const grid = document.getElementById('project-grid');
  grid.innerHTML = '';
  
  const filtered = DATA.projects.filter(p => {
    if(filter === 'top') return p.topVisits === 'yes';
    return true;
  });

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card space-y-4';
    // RESTORED YOUR ORIGINAL CARD DESIGN
    card.innerHTML = `
      <div class="relative group bg-zinc-900 border border-zinc-800 overflow-hidden aspect-video">
        <img src="${p.img}" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" />
      </div>
      <div class="flex justify-between items-start pt-2">
        <div>
          <h4 class="text-white font-bold text-xl">${p.title}</h4>
          <div class="flex gap-2 mt-2">
            ${p.tags.map(t => `<span class="text-[9px] font-mono px-2 py-1 border border-zinc-800 text-zinc-500 uppercase">${t}</span>`).join('')}
          </div>
        </div>
        <div class="text-right">
          <span class="text-[10px] font-mono text-orange-500 border border-orange-500/20 px-2 py-1 bg-orange-500/5 uppercase tracking-tighter">${p.stats}</span>
        </div>
      </div>
      <p class="text-zinc-500 text-xs leading-relaxed max-w-sm">${p.desc}</p>
    `;
    grid.appendChild(card);
    setTimeout(() => card.classList.add('visible'), 50);
  });
  icons();
}

function filterProjects(cat) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.f === cat);
  });
  renderProjects(cat);
}

function renderSocials() {
  const row = document.getElementById('social-row');
  const items = [
    { href: DATA.socials.discord, icon: 'message-square' },
    { href: DATA.socials.website, icon: 'globe' }
  ];
  items.forEach(s => {
    const a = document.createElement('a');
    a.href = s.href; a.target = '_blank';
    a.className = 'w-10 h-10 flex items-center justify-center border border-zinc-800 hover:border-orange-500 text-zinc-500 hover:text-orange-500 transition-all';
    a.innerHTML = `<i data-lucide="${s.icon}" class="w-4 h-4"></i>`;
    row.appendChild(a);
  });
  icons();
}

renderStats();
renderProjects();
renderSocials();
</script>

</body>
</html>
