<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#000;color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}
::selection{background:rgba(0,212,255,.22);color:#00d4ff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:99px}

/* ── Utilities ── */
.grad-cyan{background:linear-gradient(135deg,#00d4ff,#4f8eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-white{background:linear-gradient(135deg,#fff 45%,rgba(255,255,255,.3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glass{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.grid-bg{background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.35),transparent)}

/* ── Hero orb ── */
.hero-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:min(700px,130vw);height:min(700px,130vw);background:radial-gradient(circle,rgba(0,212,255,.14) 0%,rgba(79,142,255,.07) 38%,transparent 68%);border-radius:50%;filter:blur(30px);pointer-events:none}

/* ── Navbar ── */
#navbar{transition:background .35s,border-bottom .35s}
#navbar.scrolled{background:rgba(0,0,0,.78)!important;backdrop-filter:blur(22px)!important;-webkit-backdrop-filter:blur(22px)!important;border-bottom:1px solid rgba(0,212,255,.12)!important}

/* ── Buttons ── */
.btn-grad{background:linear-gradient(90deg,#00d4ff,#4f8eff);transition:opacity .2s,transform .15s}
.btn-grad:hover{opacity:.88;transform:scale(1.04)}
.btn-grad:active{transform:scale(.97)}
.btn-outline{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);transition:background .2s,border-color .2s,transform .15s}
.btn-outline:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.28);transform:scale(1.04)}

/* ── Animations ── */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .75s cubic-bezier(.22,1,.36,1)}
.fade-up.visible{opacity:1;transform:translateY(0)}
.d1{transition-delay:.06s}.d2{transition-delay:.13s}.d3{transition-delay:.20s}
.d4{transition-delay:.27s}.d5{transition-delay:.34s}.d6{transition-delay:.41s}
.d7{transition-delay:.48s}.d8{transition-delay:.55s}.d9{transition-delay:.62s}

.bounce{animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

.live-dot{width:8px;height:8px;border-radius:50%;background:#00ffb3;box-shadow:0 0 8px #00ffb3;animation:livepulse 1.8s ease-in-out infinite;flex-shrink:0}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.45)}}

.cursor{display:inline-block;width:2px;height:1em;background:#00d4ff;vertical-align:middle;margin-left:3px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Project grid — FIX: explicit grid prevents broken vertical layout ── */
#project-grid{
  display: grid;
  /* auto-fill creates as many columns as fit; min 280px, max equal share */
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.25rem;
  /* Prevent any child from blowing out the grid column */
  align-items: start;
}

/* ── Project cards ── */
.proj-card{
  /* reset any accidental height constraints */
  height: auto;
  min-height: 0;
  transition: box-shadow .3s, border-color .3s, transform .25s;
  cursor: default;
}
.proj-card:hover{transform:translateY(-4px)}
/* FIX: use strictly Cyan/Blue theme — no green on QA cards */
.proj-card[data-cat="QA Testing"]:hover    {box-shadow:0 0 32px rgba(0,212,255,.18),0 0 70px rgba(0,212,255,.07);border-color:rgba(0,212,255,.4)!important}
.proj-card[data-cat="GFX / Photoshop"]:hover{box-shadow:0 0 32px rgba(79,142,255,.18),0 0 70px rgba(79,142,255,.07);border-color:rgba(79,142,255,.4)!important}
.proj-card[data-cat="Discord Bots"]:hover  {box-shadow:0 0 32px rgba(124,92,255,.18),0 0 70px rgba(124,92,255,.07);border-color:rgba(124,92,255,.4)!important}

/* ── Card thumbnail ── */
.card-thumb{width:100%;height:160px;border-radius:10px;overflow:hidden;margin-bottom:1rem;flex-shrink:0}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.proj-card:hover .card-thumb img{transform:scale(1.05)}
.card-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:10px}

/* ── Skill bars ── */
.skill-fill{height:100%;border-radius:99px;width:0;transition:width 1.4s cubic-bezier(.22,1,.36,1)}

/* ── Filter pills ── */
.pill{cursor:pointer;transition:background .2s,color .2s,border-color .2s,transform .15s}
.pill:not([class*="pill-active"]):hover{border-color:rgba(255,255,255,.28)!important;color:#fff!important;transform:scale(1.04)}
.pill-active-all {background:linear-gradient(90deg,#00d4ff,#4f8eff)!important;color:#000!important;border-color:transparent!important}
.pill-active-qa  {background:linear-gradient(90deg,#00d4ff,#4f8eff)!important;color:#000!important;border-color:transparent!important}
.pill-active-gfx {background:linear-gradient(90deg,#4f8eff,#2255cc)!important;color:#000!important;border-color:transparent!important}
.pill-active-bot {background:linear-gradient(90deg,#7c5cff,#4422cc)!important;color:#000!important;border-color:transparent!important}

/* ── Tags — FIX: all tags use Cyan/Blue, no green text ── */
.tag-qa {background:rgba(0,212,255,.1); color:#00d4ff; border:1px solid rgba(0,212,255,.22)}
.tag-gfx{background:rgba(79,142,255,.1);color:#7aaaff; border:1px solid rgba(79,142,255,.22)}
.tag-bot{background:rgba(124,92,255,.1);color:#b09cff; border:1px solid rgba(124,92,255,.22)}

/* ── Status dot — FIX: Completed = muted white, never green ── */
.status-dot-completed{background:rgba(255,255,255,.22)}
.status-dot-active   {background:#4f8eff;box-shadow:0 0 6px rgba(79,142,255,.7)}

/* ── Stat strip ── */
.stat-strip{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1)}

/* ── Socials ── */
.social-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);transition:background .2s,border-color .2s,transform .2s;text-decoration:none}
.social-btn:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.28);transform:scale(1.12)}

/* ── View link ── */
.view-link{transition:gap .2s}
.proj-card:hover .view-link{gap:10px!important}

/* ── Mobile menu ── */
#mobile-menu{display:none}
#mobile-menu.open{display:flex}
</style>

    <div class="bounce"><i data-lucide="chevron-down" style="width:15px;height:15px;color:rgba(255,255,255,.2)"></i></div>
  </div>
</section>

<!-- ══════════════ PROJECTS ══════════════ -->
<section id="projects" style="padding:6rem 1.5rem;max-width:80rem;margin:0 auto">

  <div class="fade-up" style="margin-bottom:3rem">
    <p class="font-dm" style="font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#00d4ff;margin-bottom:.75rem">Portfolio</p>
    <h2 class="font-syne" style="font-weight:900;color:#fff;font-size:clamp(2rem,5vw,3.25rem);letter-spacing:-.02em">Selected Work</h2>
  </div>

  <div id="filter-bar" class="fade-up d1" style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2.5rem">
    <button onclick="filterProjects('All')"             data-f="All"
      class="pill pill-active-all font-dm" style="font-size:.8rem;font-weight:700;padding:.5rem 1rem;border-radius:99px;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px">All</button>
    <button onclick="filterProjects('QA Testing')"      data-f="QA Testing"
      class="pill font-dm" style="font-size:.8rem;font-weight:700;padding:.5rem 1rem;border-radius:99px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);display:inline-flex;align-items:center;gap:6px">
      <i data-lucide="gamepad-2" style="width:13px;height:13px"></i>QA Testing</button>
    <button onclick="filterProjects('GFX / Photoshop')" data-f="GFX / Photoshop"
      class="pill font-dm" style="font-size:.8rem;font-weight:700;padding:.5rem 1rem;border-radius:99px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);display:inline-flex;align-items:center;gap:6px">
      <i data-lucide="image" style="width:13px;height:13px"></i>GFX / Photoshop</button>
    <button onclick="filterProjects('Discord Bots')"    data-f="Discord Bots"
      class="pill font-dm" style="font-size:.8rem;font-weight:700;padding:.5rem 1rem;border-radius:99px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);display:inline-flex;align-items:center;gap:6px">
      <i data-lucide="bot" style="width:13px;height:13px"></i>Discord Bots</button>
  </div>

  <!-- Grid: ID is targeted by CSS above for layout fix -->
  <div id="project-grid"></div>
</section>

<!-- ══════════════ SKILLS ══════════════ -->
<section id="skills" style="padding:6rem 1.5rem;max-width:80rem;margin:0 auto">

  <div class="fade-up" style="margin-bottom:3rem">
    <p class="font-dm" style="font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#4f8eff;margin-bottom:.75rem">Expertise</p>
    <h2 class="font-syne" style="font-weight:900;color:#fff;font-size:clamp(2rem,5vw,3.25rem);letter-spacing:-.02em">Skill Matrix</h2>
  </div>

  <div id="skill-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:1.25rem;margin-bottom:1.5rem"></div>

  <div class="stat-strip fade-up" style="border-radius:1rem;padding:2rem">
    <div id="stat-strip" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1.5rem"></div>
  </div>
</section>

<!-- ══════════════ CONTACT / FOOTER ══════════════ -->
<footer id="contact" style="padding:6rem 1.5rem;max-width:80rem;margin:0 auto">
  <div class="divider" style="margin-bottom:5rem"></div>
  <div style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:3rem">

    <div class="fade-up">
      <p class="font-dm" style="font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:#00d4ff;margin-bottom:.75rem">Let's Connect</p>
      <h2 class="font-syne" style="font-weight:900;color:#fff;font-size:clamp(2rem,5vw,3.25rem);letter-spacing:-.02em;line-height:1.1;margin-bottom:1.5rem">Got a project<br>in mind?</h2>
      <button id="footer-copy-btn" onclick="copyDiscord('footer')" class="btn-grad font-dm"
        style="display:inline-flex;align-items:center;gap:10px;padding:.875rem 1.5rem;border-radius:99px;font-weight:700;color:#000;font-size:.875rem;cursor:pointer;border:none">
        <i data-lucide="copy" id="footer-icon" style="width:15px;height:15px;flex-shrink:0"></i>
        <span id="footer-label"></span>
      </button>
    </div>

    <div class="fade-up d2" style="display:flex;flex-direction:column;align-items:flex-start;gap:1rem">
      <div id="social-row" style="display:flex;gap:.75rem"></div>
      <p id="footer-cr" class="font-dm" style="font-size:.75rem;color:rgba(255,255,255,.2)"></p>
    </div>
  </div>
</footer>

<!-- ════════════════════════════════════════════════════
     ENGINE — DO NOT EDIT BELOW THIS LINE
════════════════════════════════════════════════════ -->
<script>
/* ── Icon init ── */
function icons(){ if(window.lucide) lucide.createIcons(); }

/* ── Static text ── */
document.getElementById('nav-name').textContent     = DATA.short;
document.getElementById('nav-label').textContent    = DATA.discord;
document.getElementById('hero-name').textContent    = DATA.short;
document.getElementById('hero-tagline').textContent = DATA.tagline;
document.getElementById('footer-label').textContent = 'Copy Discord — ' + DATA.discord;
document.getElementById('footer-cr').textContent    = '© ' + new Date().getFullYear() + ' ' + DATA.name + ' — All rights reserved.';

/* ── Status badge ── */
(function(){
  const badge = document.getElementById('hero-badge');
  const ok    = DATA.status === 'Available';
  badge.style.cssText = ok
    ? 'display:inline-flex;align-items:center;gap:8px;padding:.375rem 1rem;border-radius:99px;margin-bottom:2rem;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.22)'
    : 'display:inline-flex;align-items:center;gap:8px;padding:.375rem 1rem;border-radius:99px;margin-bottom:2rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)';
  const dotStyle = ok
    ? 'width:8px;height:8px;border-radius:50%;background:#00d4ff;box-shadow:0 0 8px rgba(0,212,255,.7);flex-shrink:0;animation:livepulse 1.8s ease-in-out infinite'
    : 'width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0';
  const textColor = ok ? '#00d4ff' : 'rgba(255,255,255,.4)';
  const label     = ok ? 'Available for Work' : DATA.status;
  badge.innerHTML = `<div style="${dotStyle}"></div>
    <span class="font-dm" style="font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:${textColor}">${label}</span>`;
})();

/* ── Navbar scroll ── */
window.addEventListener('scroll', ()=>{
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});

/* ── Mobile menu ── */
function toggleMenu(){ document.getElementById('mobile-menu').classList.toggle('open'); }
document.addEventListener('click', e=>{
  const m = document.getElementById('mobile-menu');
  const h = document.getElementById('hamburger');
  if(!m.contains(e.target) && !h.contains(e.target)) m.classList.remove('open');
});

/* ── Typewriter ── */
(()=>{
  const el = document.getElementById('typewriter-text');
  let wi=0, ci=0, del=false;
  function tick(){
    const w = DATA.roles[wi];
    el.textContent = w.slice(0, ci);
    if(!del){ ci++; if(ci > w.length){ del=true; setTimeout(tick,2000); return; } }
    else    { ci--; if(ci < 0){ ci=0; del=false; wi=(wi+1)%DATA.roles.length; setTimeout(tick,350); return; } }
    setTimeout(tick, del ? 45 : 85);
  }
  tick();
})();

/* ── Discord copy ── */
function copyDiscord(prefix){
  navigator.clipboard.writeText(DATA.discord).catch(()=>{});
  const btn    = document.getElementById(prefix === 'nav' ? 'nav-copy-btn'  : 'footer-copy-btn');
  const iconEl = document.getElementById(prefix === 'nav' ? 'nav-icon'      : 'footer-icon');
  const lblEl  = document.getElementById(prefix === 'nav' ? 'nav-label'     : 'footer-label');
  const origLabel = lblEl ? lblEl.textContent : '';
  btn.style.background = '#00ffb3';
  if(lblEl)  lblEl.textContent = 'Copied!';
  if(iconEl){ iconEl.setAttribute('data-lucide','check'); icons(); }
  setTimeout(()=>{
    btn.style.background = '';
    if(lblEl)  lblEl.textContent = origLabel;
    if(iconEl){ iconEl.setAttribute('data-lucide','copy'); icons(); }
  }, 2200);
}

/* ── Category meta ── */
const CAT_META = {
  'QA Testing':      { icon:'gamepad-2', color:'#00d4ff', tc:'tag-qa'  },
  'GFX / Photoshop': { icon:'image',     color:'#4f8eff', tc:'tag-gfx' },
  'Discord Bots':    { icon:'bot',       color:'#7c5cff', tc:'tag-bot' }
};

/* FIX: status dot uses Cyan/Blue only — no green on completed cards */
function statusDot(status){
  if(status === 'Ongoing' || status === 'Deployed'){
    return `<div style="width:6px;height:6px;border-radius:50%;background:#4f8eff;box-shadow:0 0 6px rgba(79,142,255,.8);flex-shrink:0"></div>`;
  }
  return `<div style="width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);flex-shrink:0"></div>`;
}

/* ── Thumbnail builder ── */
function buildThumb(p, m){
  if(p.thumbnail){
    /* safe: escape quotes to avoid breaking the onerror attribute */
    const safeIcon  = m.icon.replace(/'/g,"\\'");
    const safeColor = m.color.replace(/'/g,"\\'");
    return `<div class="card-thumb">
      <img src="${p.thumbnail}" alt="${p.title}" loading="lazy"
        onerror="this.parentElement.innerHTML='<div class=\\'card-thumb-placeholder\\'style=\\'background:${m.color}0d;border:1px solid ${m.color}20\\'><i data-lucide=\\'${m.icon}\\'style=\\'width:32px;height:32px;color:${m.color};opacity:.4\\'></i></div>';if(window.lucide)lucide.createIcons()">
    </div>`;
  }
  return `<div class="card-thumb">
    <div class="card-thumb-placeholder" style="background:${m.color}0d;border:1px solid ${m.color}20">
      <i data-lucide="${m.icon}" style="width:32px;height:32px;color:${m.color};opacity:.4"></i>
    </div>
  </div>`;
}

/* ── Render projects
   FIX: projects are already ordered newest-first in DATA.projects
   (highest id at top of list). We render them as-is — no reverse needed.
   If you ever want to re-enable reverse, change the line below to:
     const list = (filter === 'All' ? [...DATA.projects] : DATA.projects.filter(…)).reverse();
── */
function renderProjects(filter){
  const grid = document.getElementById('project-grid');
  grid.innerHTML = '';

  const list = filter === 'All'
    ? DATA.projects
    : DATA.projects.filter(p => p.cat === filter);

  if(list.length === 0){
    grid.innerHTML = `<p class="font-dm" style="color:rgba(255,255,255,.3);font-size:.9rem;padding:2rem 0">No projects in this category yet.</p>`;
    return;
  }

  list.forEach((p, i)=>{
    const m  = CAT_META[p.cat] || { icon:'star', color:'#00d4ff', tc:'tag-qa' };

    const card = document.createElement('div');
    card.className   = 'proj-card glass fade-up';
    card.dataset.cat = p.cat;
    /* FIX: height:auto; width:100% ensures card fills column without overflow */
    card.style.cssText = `border-radius:1rem;padding:1.5rem;display:flex;flex-direction:column;height:auto;width:100%;transition-delay:${i * .06}s`;

    card.innerHTML = `
      ${buildThumb(p, m)}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
        <div style="width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${m.color}1a;border:1px solid ${m.color}28">
          <i data-lucide="${m.icon}" style="width:16px;height:16px;color:${m.color}"></i>
        </div>
        <div style="display:inline-flex;align-items:center;gap:5px">
          ${statusDot(p.status)}
          <span class="font-dm" style="font-size:.7rem;font-weight:500;color:rgba(255,255,255,.3)">${p.status}</span>
        </div>
      </div>
      <h3 class="font-syne" style="font-weight:700;color:#fff;font-size:.95rem;margin-bottom:.5rem">${p.title}</h3>
      <p class="font-dm" style="font-size:.8rem;line-height:1.65;margin-bottom:1rem;flex:1;color:rgba(255,255,255,.4)">${p.desc}</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem">
        ${p.tags.map(t=>`<span class="${m.tc} font-dm" style="font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:6px">${t}</span>`).join('')}
      </div>
      <a href="${p.link}" target="_blank" rel="noreferrer" class="view-link font-dm"
        style="display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:700;color:${m.color};text-decoration:none;margin-top:auto">
        View Project <i data-lucide="external-link" style="width:12px;height:12px"></i>
      </a>`;

    grid.appendChild(card);
    requestAnimationFrame(()=> requestAnimationFrame(()=> card.classList.add('visible')));
  });
  icons();
}

/* ── Filter pills ── */
const PILL_CLS = {
  'All':             'pill-active-all',
  'QA Testing':      'pill-active-qa',
  'GFX / Photoshop': 'pill-active-gfx',
  'Discord Bots':    'pill-active-bot'
};
function filterProjects(cat){
  document.querySelectorAll('#filter-bar button').forEach(btn=>{
    const f = btn.dataset.f;
    btn.className = 'pill font-dm';
    if(f === cat){
      btn.classList.add(PILL_CLS[f]);
      btn.style.cssText = 'font-size:.8rem;font-weight:700;padding:.5rem 1rem;border-radius:99px;display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;cursor:pointer';
    } else {
      btn.style.cssText = 'font-size:.8rem;font-weight:700;padding:.5rem 1rem;border-radius:99px;display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);cursor:pointer';
    }
  });
  renderProjects(cat);
}

/* ── Render skills ── */
function renderSkills(){
  const grid = document.getElementById('skill-grid');
  DATA.skills.forEach((s, i)=>{
    const card = document.createElement('div');
    card.className = 'glass fade-up';
    card.style.cssText = `border-radius:1rem;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;transition-delay:${i * .08}s`;
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:.75rem">
        <div style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${s.color}1a;border:1px solid ${s.color}30">
          <i data-lucide="${s.icon}" style="width:17px;height:17px;color:${s.color}"></i>
        </div>
        <div>
          <p class="font-syne" style="font-weight:700;color:#fff;font-size:.9rem">${s.label}</p>
          <p class="font-dm" style="font-size:.73rem;font-family:monospace;color:${s.color}">${s.pct}%</p>
        </div>
      </div>
      <div style="height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden">
        <div class="skill-fill" data-pct="${s.pct}" style="background:linear-gradient(90deg,${s.color},${s.color}66)"></div>
      </div>
      <p class="font-dm" style="font-size:.75rem;line-height:1.6;color:rgba(255,255,255,.35)">${s.desc}</p>`;
    grid.appendChild(card);
  });
  icons();
}

/* ── Render stats ── */
function renderStats(){
  const el = document.getElementById('stat-strip');
  DATA.stats.forEach(s=>{
    const d = document.createElement('div');
    d.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center';
    d.innerHTML = `
      <span class="font-syne grad-cyan" style="font-weight:900;font-size:clamp(1.8rem,4vw,2.5rem)">${s.n}</span>
      <span class="font-dm" style="font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3)">${s.label}</span>`;
    el.appendChild(d);
  });
}

/* ── Render socials ── */
function renderSocials(){
  const items = [
    { href: DATA.socials.github,  icon:'github',         label:'GitHub'  },
    { href: DATA.socials.discord, icon:'message-square', label:'Discord' },
    { href: DATA.socials.website, icon:'globe',          label:'Site'    }
  ];
  const row = document.getElementById('social-row');
  items.forEach(s=>{
    const a = document.createElement('a');
    a.href=s.href; a.target='_blank'; a.rel='noreferrer'; a.title=s.label;
    a.className='social-btn';
    a.innerHTML=`<i data-lucide="${s.icon}" style="width:16px;height:16px;color:rgba(255,255,255,.5)"></i>`;
    row.appendChild(a);
  });
  icons();
}

/* ── IntersectionObserver: fade-up + skill bars ── */
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    e.target.classList.add('visible');
    e.target.querySelectorAll('.skill-fill').forEach(b=>{ b.style.width = b.dataset.pct + '%'; });
    obs.unobserve(e.target);
  });
}, { threshold: 0.08 });

function observeAll(){ document.querySelectorAll('.fade-up').forEach(el=> obs.observe(el)); }

/* ── Boot ── */
renderProjects('All');
renderSkills();
renderStats();
renderSocials();
icons();
observeAll();
</script>
</body>
</html>
